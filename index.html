<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Litj — Vue 3 Portfolio & AI Blog</title>
  <meta name="description" content="Litj 的 Vue 3 多页面作品站，聚焦前端开发、AI 应用开发、自动化项目与教程输出。" />
  <meta name="theme-color" content="#0b1220" />
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.prod.js"></script>
  <style>
    :root {
      --bg: #07111f;
      --bg-soft: #0d1628;
      --bg-card: rgba(13, 22, 40, 0.68);
      --bg-card-strong: rgba(17, 28, 48, 0.86);
      --line: rgba(255,255,255,.08);
      --text: #edf5ff;
      --muted: #9ab0cb;
      --blue: #5db4ff;
      --blue-2: #2f7cff;
      --violet: #8c7cff;
      --green: #52f0b1;
      --pink: #ff6ca8;
      --shadow: 0 24px 80px rgba(0,0,0,.3);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --max: 1220px;
      --nav-h: 76px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(93,180,255,.15), transparent 25%),
        radial-gradient(circle at 85% 0%, rgba(140,124,255,.14), transparent 22%),
        radial-gradient(circle at 50% 100%, rgba(82,240,177,.1), transparent 28%),
        linear-gradient(180deg, #060d18 0%, #08111e 35%, #0a1323 100%);
      color: var(--text);
      font-family: "MiSans", "MiSans Normal", "PingFang SC", "Inter", "Microsoft YaHei", sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
    }

    a { color: inherit; }
    ::selection { background: rgba(93,180,255,.2); }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,.03); }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, rgba(93,180,255,.55), rgba(47,124,255,.86));
      border-radius: 999px;
      border: 2px solid rgba(9,16,29,.9);
    }

    #app { min-height: 100vh; }

    .ambient, .ambient-2 {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
      z-index: 0;
      opacity: .22;
      will-change: transform;
    }
    .ambient {
      width: 34vw; height: 34vw; left: -8vw; top: -12vh;
      background: rgba(93,180,255,.42);
      animation: floatA 16s ease-in-out infinite alternate;
    }
    .ambient-2 {
      width: 28vw; height: 28vw; right: -10vw; top: 18vh;
      background: rgba(140,124,255,.28);
      animation: floatB 18s ease-in-out infinite alternate;
    }
    @keyframes floatA { from { transform: translate3d(0,0,0) scale(1); } to { transform: translate3d(24px,14px,0) scale(1.08); } }
    @keyframes floatB { from { transform: translate3d(0,0,0) scale(1);} to { transform: translate3d(-20px,20px,0) scale(1.08);} }

    .progress {
      position: fixed;
      top: 0; left: 0;
      height: 3px; width: 0;
      z-index: 60;
      background: linear-gradient(90deg, var(--blue), var(--violet), var(--pink));
      box-shadow: 0 0 18px rgba(93,180,255,.36);
      transform-origin: left center;
    }

    .shell {
      position: relative;
      z-index: 2;
      width: min(var(--max), calc(100% - 28px));
      margin: 0 auto;
    }

    .glass {
      background: var(--bg-card);
      border: 1px solid rgba(255,255,255,.1);
      backdrop-filter: blur(22px) saturate(150%);
      -webkit-backdrop-filter: blur(22px) saturate(150%);
      box-shadow: var(--shadow);
    }

    .nav {
      position: sticky;
      top: 14px;
      z-index: 40;
      margin-top: 14px;
      border-radius: 24px;
    }
    .nav-inner {
      min-height: var(--nav-h);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 14px 18px;
      flex-wrap: wrap;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: .2px;
      text-decoration: none;
    }
    .brand-mark {
      width: 40px; height: 40px;
      border-radius: 14px;
      display: grid; place-items: center;
      color: #03121e;
      background: linear-gradient(135deg, var(--blue), var(--green));

    .nav-links {

      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .nav-link {
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      padding: 10px 14px;
      border-radius: 999px;

      background: rgba(255,255,255,.06);

    .page {
      padding: 28px 0 46px;
      min-height: calc(100vh - 110px);
    }

    .hero {

      grid-template-columns: 1.1fr .9fr;
      gap: 18px;
      align-items: stretch;
      margin-bottom: 18px;
    }
    .hero-main, .hero-side-card, .section, .card, .article-card, .cta {
      border-radius: 28px;
      overflow: hidden;
    }
    .hero-main {
      position: relative;
      padding: 32px;
      min-height: 500px;

        radial-gradient(circle at 88% 12%, rgba(140,124,255,.12), transparent 24%),
        linear-gradient(180deg, rgba(255,255,255,.04), transparent 30%);

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      color: #dbe9f7;
      font-size: 12px;
      font-weight: 700;
    }
    .hero-title {
      margin: 18px 0 0;
      font-size: clamp(28px, 4.4vw, 52px);
      line-height: 1.08;
      letter-spacing: -1.2px;
      max-width: 760px;
    }
    .hero-title .accent {
      background: linear-gradient(135deg, #ffffff 0%, #8ecfff 30%, #7af0c2 62%, #aa98ff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .hero-desc {
      margin: 18px 0 0;
      max-width: 700px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.95;
    }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 24px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 13px 18px;
      border-radius: 18px;
      font-size: 14px;
      font-weight: 800;
      text-decoration: none;
      transition: transform .28s cubic-bezier(.22,.61,.36,1), box-shadow .28s ease, background .28s ease;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn-primary {
      color: #06111d;
      background: linear-gradient(135deg, var(--blue), var(--green));
      box-shadow: 0 14px 34px rgba(93,180,255,.22);
    }
    .btn-secondary {
      color: var(--text);
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 24px;
    }
    .stat {
      padding: 18px;
      border-radius: 20px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
    }
    .stat strong {
      display: block;
      font-size: 22px;
      margin-bottom: 6px;
      letter-spacing: -.4px;
    }
    .stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
    }

    .hero-side {
      display: grid;
      gap: 18px;
    }
    .hero-side-card, .section, .card, .article-card, .cta {
      padding: 24px;
    }
    .hero-side-card h3,
    .section h3,
    .card h3,
    .article-card h3,
    .cta h2,
    .section-head h2 {
      margin: 0 0 10px;
      letter-spacing: -.4px;
    }
    .hero-side-card p,
    .section p,
    .card p,
    .article-card p,
    .cta p,
    .section-head p {
      margin: 0;
      color: var(--muted);
      line-height: 1.85;
      font-size: 14px;
    }

    .chips, .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }
    .chip, .tag {
      padding: 9px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      color: #d8e7f7;
    }

    .section-block { margin-top: 16px; }
    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .section-head h2 {
      margin: 0;
      font-size: clamp(24px, 3vw, 38px);
    }

    .grid-2, .grid-3, .article-grid {
      display: grid;
      gap: 18px;
    }
    .grid-2 { grid-template-columns: repeat(2, 1fr); }
    .grid-3, .article-grid { grid-template-columns: repeat(3, 1fr); }

    .lift {
      transition: transform .34s cubic-bezier(.22,.61,.36,1), box-shadow .34s ease;
      will-change: transform;
    }
    .lift:hover {
      transform: translateY(-6px);
      box-shadow: 0 30px 80px rgba(0,0,0,.28);
    }

    .list {
      display: grid;
      gap: 12px;
      margin-top: 14px;
    }
    .list-item {
      display: grid;
      grid-template-columns: 12px 1fr;
      gap: 12px;
      align-items: start;
    }
    .dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      margin-top: 6px;
      background: linear-gradient(135deg, var(--blue), var(--violet));
      box-shadow: 0 0 14px rgba(93,180,255,.28);
    }
    .list-item strong {
      display: block;
      margin-bottom: 4px;
      font-size: 15px;
    }
    .list-item span {
      display: block;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.85;
    }

    .article-meta {
      margin-bottom: 8px;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #7890ad;
      font-weight: 700;
    }

    .timeline {
      display: grid;
      gap: 14px;
    }
    .timeline-item {
      padding: 18px;
      border-radius: 18px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.06);
    }
    .timeline-item small {
      display: block;
      margin-bottom: 6px;
      color: #8aa3bf;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .8px;
      font-weight: 700;
    }

    .cta {
      margin: 26px 0 56px;
      text-align: center;
      background: var(--bg-card-strong);
    }

    footer {
      text-align: center;
      color: var(--muted);
      padding: 0 0 34px;
      font-size: 13px;
    }

    .fade-up {
      opacity: 0;
      transform: translate3d(0, 16px, 0);
      transition: opacity .8s cubic-bezier(.22,.61,.36,1), transform .8s cubic-bezier(.22,.61,.36,1);
    }
    .fade-up.visible {
      opacity: 1;
      transform: translate3d(0,0,0);
    }

    @media (max-width: 1080px) {
      .hero,
      .grid-2,
      .grid-3,
      .article-grid {
        grid-template-columns: 1fr;
      }
    }
    @media (max-width: 720px) {
      .shell { width: min(var(--max), calc(100% - 18px)); }
      .hero-main, .hero-side-card, .section, .card, .article-card, .cta { padding: 18px; border-radius: 22px; }
      .hero-title { font-size: clamp(24px, 8.5vw, 36px); }
      .stats { grid-template-columns: 1fr; }
    }
  </style>
</head>

    ];

    const router = createRouter({
      history: createWebHashHistory(),
      routes,
      scrollBehavior() {
        return { top: 0, behavior: 'smooth' };
      }
    });

    const App = {
      setup() {
        const progress = ref(0);

        const updateProgress = () => {
          const height = document.documentElement.scrollHeight - window.innerHeight;
          progress.value = height <= 0 ? 0 : (window.scrollY / height) * 100;
        };

        const reveal = () => {
          document.querySelectorAll('.fade-up').forEach((el) => {
            const rect = el.getBoundingClientRect();
            if (rect.top < window.innerHeight * 0.92) {
              el.classList.add('visible');
            }
          });
        };

        onMounted(() => {
          const tick = () => {
            updateProgress();
            reveal();
          };

          tick();
          window.addEventListener('scroll', tick, { passive: true });
          window.addEventListener('resize', tick);
        });

        watch(() => router.currentRoute.value.fullPath, async () => {
          await nextTick();
          window.scrollTo({ top: 0, behavior: 'smooth' });
          setTimeout(() => {
            reveal();
            updateProgress();
          }, 60);
        });

        return { progress };
      },
      components: { RouterLink, RouterView },
      template: `
        <div>
          <div class="progress" :style="{ width: progress + '%' }"></div>
          <div class="ambient"></div>
          <div class="ambient-2"></div>
          <div class="shell">

          <div class="shell">
            <footer>© ${new Date().getFullYear()} Litj · Vue 3 Portfolio · Built for interview impact and real deployment.</footer>
          </div>
        </div>
      `
    };

    createApp(App).use(router).mount('#app');
  </script>
